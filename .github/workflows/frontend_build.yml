name: Frontend Build Check

# frontend/ に変更が入った push でビルドを検証する。
# 失敗したら（=Vercelへのデプロイも失敗する）Gmailに即通知する。
on:
  push:
    branches: [main]
    paths: ['frontend/**']
  workflow_dispatch:        # 手動実行ボタン

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Build (type check + production build)
        working-directory: frontend
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: npm run build

      - name: Smoke test (start server + check pages)
        working-directory: frontend
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: |
          npx next start -p 3000 &
          SERVER_PID=$!
          # サーバー起動待ち（最大30秒）
          for i in $(seq 1 15); do
            curl -sf http://localhost:3000/ > /dev/null && break
            sleep 2
          done

          FAILED=0
          check_page() {
            local path=$1
            local keyword=$2
            local body
            body=$(curl -sf "http://localhost:3000${path}" 2>&1)
            if [ $? -ne 0 ]; then
              echo "❌ FAIL ${path} — HTTP error"
              FAILED=1
            elif ! echo "$body" | grep -q "$keyword"; then
              echo "❌ FAIL ${path} — '${keyword}' not found"
              FAILED=1
            else
              echo "✅ OK   ${path}"
            fi
          }

          check_page "/"          "StockSignal"
          check_page "/rankings"  "StockSignal"
          check_page "/model"     "StockSignal"

          kill $SERVER_PID 2>/dev/null || true

          if [ $FAILED -ne 0 ]; then
            echo "スモークテスト失敗"
            exit 1
          fi
          echo "全ページ OK"

      - name: Verify Vercel production deployment
        if: success()
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: |
          if [ -z "$VERCEL_TOKEN" ]; then
            echo "VERCEL_TOKEN 未設定 — スキップ"
            exit 0
          fi
          PROJECT_ID="prj_MCyYVEhxABeth2g4rWyV7FafZjbE"
          echo "Vercel本番デプロイ状態を確認中..."
          for i in $(seq 1 12); do
            STATE=$(curl -sf -H "Authorization: Bearer $VERCEL_TOKEN" \
              "https://api.vercel.com/v6/deployments?projectId=${PROJECT_ID}&target=production&limit=1" \
              | python3 -c "import sys,json; d=json.load(sys.stdin)['deployments'][0]; print(d['readyState'])")
            echo "  attempt ${i}: ${STATE}"
            if [ "$STATE" = "READY" ]; then
              echo "✅ 本番デプロイ確認完了（READY）"
              exit 0
            elif [ "$STATE" = "ERROR" ] || [ "$STATE" = "CANCELED" ]; then
              echo "❌ デプロイ失敗: ${STATE}"
              exit 1
            fi
            sleep 10
          done
          echo "⚠️ タイムアウト（2分）— 状態: ${STATE}"
          exit 1

      - name: Notify on failure
        if: ${{ false }}  # ユーザー依頼で障害通知メール停止(2026-06-18)。復活は if: failure() に戻す
        env:
          GMAIL_ADDRESS: ${{ secrets.GMAIL_ADDRESS }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
        run: |
          python3 - <<'PY'
          import os, smtplib
          from email.mime.text import MIMEText
          addr = os.environ["GMAIL_ADDRESS"]
          pw   = os.environ["GMAIL_APP_PASSWORD"]
          to   = ""
          body = """フロントエンド（webアプリ）のビルドが失敗しました。
          このままだと Vercel へのデプロイも失敗し、ページが更新されません。

          ▼ 失敗ログ（どこでエラーかが分かります）
          https://github.com/yuyakitagawa/stock-alert/actions

          よくある原因は frontend/ のTypeScript型エラーです。
          修正して push し直すと、再びこのチェックが自動で走ります。
          """
          msg = MIMEText(body, "plain", "utf-8")
          msg["Subject"] = "🚨 webアプリのビルド失敗 — デプロイされません"
          msg["From"] = addr
          msg["To"]   = to
          with smtplib.SMTP_SSL("smtp.gmail.com", 465) as s:
              s.login(addr, pw)
              s.sendmail(addr, to, msg.as_string())
          print("ビルド失敗の通知メールを送信しました")
          PY
