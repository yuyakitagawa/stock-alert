name: Migrate SQLite to Supabase

# 一回限り: stock_alert.db キャッシュの全テーブルを Supabase へ移行する（読み取り→upsert）。
# 冪等なので複数回流しても安全。
on:
  workflow_dispatch:
    inputs:
      only:
        description: '移行するテーブル名（スペース区切り・空で全部）'
        default: ''

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  migrate:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests python-dotenv

      - name: Link repo to ~/stock-alert
        run: ln -s $GITHUB_WORKSPACE ~/stock-alert

      - name: Create .env from secrets
        run: |
          echo "SUPABASE_URL=${{ secrets.SUPABASE_URL }}" > ~/stock-alert/.env
          echo "SUPABASE_SERVICE_KEY=${{ secrets.SUPABASE_SERVICE_KEY }}" >> ~/stock-alert/.env

      - name: Restore DB cache（本番DB・読み取りのみ）
        uses: actions/cache/restore@v4
        with:
          path: ${{ github.workspace }}/stock_alert.db
          key: stock-alert-db-migrate-readonly
          restore-keys: |
            stock-alert-db-

      - name: SQLite → Supabase 移行
        run: cd ~/stock-alert && python tools/migrate_sqlite_to_supabase.py ${{ github.event.inputs.only && format('--only {0}', github.event.inputs.only) || '' }}
