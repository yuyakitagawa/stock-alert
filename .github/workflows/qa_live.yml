name: AC Check — Live Site QA

# 手動デプロイ後やリリース時に手動トリガー
# 本番サイト（SITE_URL）の全ページをチェックし、問題があればメール通知
on:
  workflow_dispatch:

jobs:
  qa:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests python-dotenv

      - name: Link repo to ~/stock-alert
        run: ln -s $GITHUB_WORKSPACE ~/stock-alert

      - name: Create .env from secrets
        run: |
          echo "GMAIL_ADDRESS=${{ secrets.GMAIL_ADDRESS }}" > ~/stock-alert/.env
          echo "GMAIL_APP_PASSWORD=${{ secrets.GMAIL_APP_PASSWORD }}" >> ~/stock-alert/.env
          echo "SUPABASE_URL=${{ secrets.SUPABASE_URL }}" >> ~/stock-alert/.env
          echo "SUPABASE_SERVICE_KEY=${{ secrets.SUPABASE_SERVICE_KEY }}" >> ~/stock-alert/.env
          echo "SITE_URL=${{ secrets.SITE_URL }}" >> ~/stock-alert/.env

      - name: AC check — live site QA
        run: |
          echo "=== AC CHECK: ${{ secrets.SITE_URL }} ==="
          cd ~/stock-alert
          python3 web/qa_pages.py
          echo "=== AC CHECK DONE ==="
