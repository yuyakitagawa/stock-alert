name: Backfill Prod DB

# 本番DBキャッシュ(stock_alert.db)に「ファンダ＋EDINET全履歴」を一括投入する一回限りのジョブ。
# 取得順: ①kabutanファンダ(fundamentals_annual) → ②J-Quants財務(jquants_fin_summary・①の開示日を使用)
#         → ③EDINET大量保有(edinet_holdings) 全履歴。保存したDBキャッシュは日次パイプラインが継承する。
# メールは送らない。重複は各テーブルの主キーで排除されるため再実行安全。
on:
  workflow_dispatch:
    inputs:
      edinet_start:
        description: 'EDINETバックフィル開始日 (YYYY-MM-DD)'
        default: '2021-06-01'
      fund_limit:
        description: 'ファンダ取得の銘柄上限（空=全銘柄）'
        default: ''

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  backfill:
    runs-on: ubuntu-latest
    timeout-minutes: 350

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests pandas numpy python-dotenv xlrd openpyxl jquants-api-client

      - name: Link repo to ~/stock-alert
        run: ln -s $GITHUB_WORKSPACE ~/stock-alert

      - name: Create .env from secrets
        run: |
          echo "JQUANTS_API_KEY=${{ secrets.JQUANTS_API_KEY }}" > ~/stock-alert/.env
          echo "EDINET_API_KEY=${{ secrets.EDINET_API_KEY }}" >> ~/stock-alert/.env

      - name: Restore DB cache（最新の本番DBを読み込み・この上に追記）
        uses: actions/cache/restore@v4
        with:
          path: ${{ github.workspace }}/stock_alert.db
          key: stock-alert-db-backfill-${{ github.run_id }}
          restore-keys: |
            stock-alert-db-

      - name: ① ファンダ取得（kabutan → fundamentals_annual：ROE/BPS/EPS/発表日）
        run: |
          cd ~/stock-alert
          LIM="${{ github.event.inputs.fund_limit }}"
          if [ -n "$LIM" ]; then
            python tools/fetch_fundamentals_history.py --limit "$LIM"
          else
            python tools/fetch_fundamentals_history.py
          fi

      - name: ② J-Quants財務取得（jquants_fin_summary：自己資本比率/会社予想・①の開示日を使用）
        run: cd ~/stock-alert && python tools/fetch_jquants_fin.py --resume

      - name: ③ EDINET大量保有 全履歴バックフィル（edinet_holdings）
        run: cd ~/stock-alert && python tools/scan_large_holdings.py --start "${{ github.event.inputs.edinet_start }}" --match-days 1

      - name: "④ 確認 A/Bカタリストスクリーン（実データで候補＋除外結果を表示）"
        if: always()
        continue-on-error: true
        run: cd ~/stock-alert && python tools/screen_catalyst_candidates.py --min-turnover 500

      - name: 件数サマリ（投入結果の確認）
        if: always()
        run: |
          cd ~/stock-alert && python -c "
          import sqlite3, lib.db as db
          con=sqlite3.connect(db.DB_PATH)
          for t in ['price_cache','fundamentals_annual','jquants_fin_summary','edinet_holdings']:
              try:
                  n=con.execute(f'SELECT COUNT(*) FROM {t}').fetchone()[0]
                  c=con.execute(f'SELECT COUNT(DISTINCT code) FROM {t}').fetchone()[0] if t!='edinet_holdings' else con.execute('SELECT COUNT(DISTINCT sec_code) FROM edinet_holdings').fetchone()[0]
                  print(f'{t}: {n}行 / {c}コード')
              except Exception as e:
                  print(t, 'ERR', e)
          con.close()
          "

      - name: Save DB cache（日次パイプラインが継承）
        if: always()
        uses: actions/cache/save@v4
        with:
          path: ${{ github.workspace }}/stock_alert.db
          key: stock-alert-db-backfill-${{ github.run_id }}
