name: Daily Stock Alert

on:
  schedule:
    - cron: '7 7 * * 1-5'  # 平日07:07 UTC = 平日16:07 JST（市場閉場後37分）
  workflow_dispatch:       # 手動実行ボタン

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  run-pipeline:
    runs-on: ubuntu-latest
    timeout-minutes: 180

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install requests pandas numpy scikit-learn joblib \
            python-dotenv openpyxl xlrd xgboost \
            gspread google-auth yfinance anthropic

      - name: Link repo to ~/stock-alert
        run: ln -s $GITHUB_WORKSPACE ~/stock-alert

      - name: Create .env from secrets
        run: |
          echo "GMAIL_ADDRESS=${{ secrets.GMAIL_ADDRESS }}" > ~/stock-alert/.env
          echo "GMAIL_APP_PASSWORD=${{ secrets.GMAIL_APP_PASSWORD }}" >> ~/stock-alert/.env
          echo "SPREADSHEET_ID=${{ secrets.SPREADSHEET_ID }}" >> ~/stock-alert/.env
          echo "SUPABASE_URL=${{ secrets.SUPABASE_URL }}" >> ~/stock-alert/.env
          echo "SUPABASE_SERVICE_KEY=${{ secrets.SUPABASE_SERVICE_KEY }}" >> ~/stock-alert/.env
          echo "ANTHROPIC_API_KEY=${{ secrets.ANTHROPIC_API_KEY }}" >> ~/stock-alert/.env
          echo "SITE_URL=${{ secrets.SITE_URL }}" >> ~/stock-alert/.env
          echo "INTERNAL_SEND_SECRET=${{ secrets.INTERNAL_SEND_SECRET }}" >> ~/stock-alert/.env

      - name: Create gcp_key.json from secret
        run: |
          echo '${{ secrets.GCP_KEY_JSON }}' > ~/stock-alert/gcp_key.json

      - name: Restore model cache
        uses: actions/cache@v4
        with:
          path: |
            ${{ github.workspace }}/rf_model.pkl
            ${{ github.workspace }}/rf_drop_model.pkl
          key: ml-models-v34baseline-weekly-${{ github.run_number }}
          restore-keys: |
            ml-models-v34baseline-weekly-

      - name: Restore DB cache
        uses: actions/cache@v4
        with:
          path: ${{ github.workspace }}/stock_alert.db
          key: stock-alert-db-${{ github.run_number }}
          restore-keys: |
            stock-alert-db-

      - name: Step 1 - スクリーニング
        run: cd ~/stock-alert && python core/screener.py

      - name: Step 2 - モデル学習（金曜 or 初回のみ）
        run: |
          DAY=$(date +%u)
          MODEL_PATH=~/stock-alert/rf_model.pkl
          if [ "$DAY" = "5" ] || [ ! -f "$MODEL_PATH" ]; then
            echo "▶ モデル学習を実行します"
            cd ~/stock-alert && python core/rf_train_v3.py
          else
            echo "⏭ モデルが存在するためスキップします"
          fi

      - name: Step 3 - ランキング生成
        run: cd ~/stock-alert && python core/rank_stocks.py

      - name: Step 4 - メールアラート送信
        run: cd ~/stock-alert && python email/alert_email.py

      - name: Step 5 - Webエクスポート（Supabase）
        run: cd ~/stock-alert && python web/export_to_web.py

      - name: Step 6 - ユーザーアラートメール送信
        run: cd ~/stock-alert && python web/send_user_alerts.py

      - name: Save model cache
        if: always()
        uses: actions/cache@v4
        with:
          path: |
            ${{ github.workspace }}/rf_model.pkl
            ${{ github.workspace }}/rf_drop_model.pkl
          key: ml-models-v34baseline-weekly-${{ github.run_number }}

      - name: Save DB cache
        if: always()
        uses: actions/cache@v4
        with:
          path: ${{ github.workspace }}/stock_alert.db
          key: stock-alert-db-${{ github.run_number }}

      - name: 結果をアーティファクトとして保存
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: daily-results-${{ github.run_number }}
          path: |
            data/rankings/ranking_*.csv
            data/screeners/screener_*.csv
          retention-days: 7
