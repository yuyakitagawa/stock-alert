name: Keepalive

on:
  schedule:
    - cron: '0 6 * * 1-5'  # 平日毎朝 06:00 UTC（daily_alertの2時間前）
  workflow_dispatch:

permissions:
  contents: write

jobs:
  keepalive:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: gautamkrishnar/keepalive-workflow@v2
        with:
          use_api: true
